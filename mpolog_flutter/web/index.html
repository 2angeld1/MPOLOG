<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Sistema de Logística Numera">
  <meta name="theme-color" content="#000000">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Numera">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Numera</title>
  <link rel="manifest" href="manifest.json">
  <!-- Google Maps se cargará automáticamente por el plugin de Flutter si es necesario -->
  <!-- <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBC_tPGHgdjsRanleoXtDzqbk00ewSATQo"></script> -->
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Detector de "Blank Screen" - Si después de 10 segundos no hay nada, intentamos limpiar caché y recargar
    setTimeout(function() {
      if (typeof window.flutterConfiguration === 'undefined' && document.body.innerHTML === '') {
        console.warn('Detectada pantalla en blanco, intentando reiniciar PWA...');
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            for(let reg of regs) reg.unregister();
            window.location.reload();
          });
        }
      }
    }, 10000);
  </script>
</body>
</html>
